<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyInvestShadow</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>MyInvestShadow</h1>
        <p>基于市场结果与主线结果的影子账户</p>
      </div>
      <button id="refreshBtn" type="button" title="拉取最新研究结果并生成影子仓位">刷新调仓</button>
    </header>

    <main>
      <section class="metrics" aria-label="账户概览">
        <div class="metric">
          <span>净值</span>
          <strong id="navValue">--</strong>
        </div>
        <div class="metric">
          <span>权益目标</span>
          <strong id="riskBudget">--</strong>
        </div>
        <div class="metric">
          <span>现金保留</span>
          <strong id="cashRatio">--</strong>
        </div>
        <div class="metric">
          <span>基准收盘日</span>
          <strong id="basisDate">--</strong>
        </div>
      </section>

      <section class="band">
        <div class="section-head">
          <h2>资金净值曲线</h2>
          <span id="marketRegime">--</span>
        </div>
        <div id="navChart" class="chart" role="img" aria-label="影子账户净值曲线"></div>
      </section>

      <section class="grid">
        <div class="panel">
          <div class="section-head">
            <h2>影子目标仓位</h2>
            <span id="allocationCount">--</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>代码</th>
                  <th>名称</th>
                  <th>主题</th>
                  <th>目标</th>
                  <th>调整</th>
                  <th>日涨跌</th>
                </tr>
              </thead>
              <tbody id="allocationRows"></tbody>
            </table>
          </div>
        </div>

        <div class="panel">
          <div class="section-head">
            <h2>真实持仓对照</h2>
            <button id="submitHoldingsBtn" type="button" title="提交真实持仓权重用于对照">提交</button>
          </div>
          <textarea id="holdingsInput" spellcheck="false">{
  "as_of_date": "2026-06-17",
  "source": "manual",
  "holdings": [
    {"code": "588170.SH", "name": "示例ETF", "weight_ratio": 8.0}
  ]
}</textarea>
          <div class="table-wrap compare-wrap">
            <table>
              <thead>
                <tr>
                  <th>代码</th>
                  <th>名称</th>
                  <th>实际</th>
                  <th>影子</th>
                  <th>差异</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="compareRows"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="band">
        <div class="section-head">
          <h2>数据状态</h2>
          <span id="statusText">--</span>
        </div>
        <div id="sourceStatus" class="status-list"></div>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>
    <script src="/static/app.js"></script>
  </body>
</html>
